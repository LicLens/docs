name: Mirror to readme.com repo

on:
  push:
    branches:
      - main

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout docs (source)
        uses: actions/checkout@v4
        with:
          path: docs
          fetch-depth: 0

      - name: Checkout readme (destination)
        uses: actions/checkout@v4
        with:
          repository: LicLens/readme
          ref: v1.0
          path: readme
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Clean stale artifacts from destination
        run: |
          rm -rf readme/docs/Documentation/.gitbook
          rm -rf readme/docs/Documentation/.github
          rm -f  readme/docs/Documentation/SUMMARY.md
          find readme/docs/Documentation -name '_order.yaml' -delete

      - name: Sync docs to readme/docs/Documentation
        run: |
          mkdir -p readme/docs/Documentation
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitbook' \
            --exclude='SUMMARY.md' \
            --exclude='_order.yaml' \
            docs/ readme/docs/Documentation/

      - name: Relocate gitbook assets and rewrite references
        run: |
          cd readme/docs/Documentation
          if [ -d ".gitbook/assets" ]; then
            mkdir -p assets
            cp -a .gitbook/assets/. assets/
            rm -rf .gitbook
          fi
          find . -type f -name '*.md' -print0 | xargs -0 --no-run-if-empty sed -i -E \
            -e 's#(\.\./)*\.gitbook/assets#assets#g' \
            -e 's#\./\.gitbook/assets#assets#g' \
            -e 's#\.gitbook/assets#assets#g'

      - name: Generate _order.yaml files from SUMMARY.md
        run: |
          python3 - <<'EOF'
          import re, os, yaml

          summary_path = "docs/SUMMARY.md"
          output_root  = "readme/docs/Documentation"

          if not os.path.exists(summary_path):
              print("No SUMMARY.md found, skipping _order.yaml generation")
              exit(0)

          with open(summary_path) as f:
              lines = f.readlines()

          entry_re = re.compile(r'^\s*[\*\-\+]\s+\[.*?\]\((.*?)\)')

          folder_order = {}

          def add_slug(folder, slug):
              if folder not in folder_order:
                  folder_order[folder] = []
              if slug not in folder_order[folder]:
                  folder_order[folder].append(slug)

          for line in lines:
              m = entry_re.match(line)
              if not m:
                  continue
              rel = m.group(1).strip()
              rel = rel.lstrip('./')
              if not rel.endswith('.md'):
                  continue

              parts = rel.split('/')

              if len(parts) == 1:
                  slug = parts[0].replace('.md', '')
                  add_slug('', slug)
              else:
                  for depth in range(len(parts) - 1):
                      parent_folder = '/'.join(parts[:depth]) if depth > 0 else ''
                      child_slug = parts[depth]
                      add_slug(parent_folder, child_slug)

                  file_slug = parts[-1].replace('.md', '')
                  file_folder = '/'.join(parts[:-1])
                  add_slug(file_folder, file_slug)

          for folder, slugs in folder_order.items():
              out_dir = os.path.join(output_root, folder) if folder else output_root
              os.makedirs(out_dir, exist_ok=True)
              out_path = os.path.join(out_dir, "_order.yaml")
              with open(out_path, "w") as f:
                  yaml.dump(slugs, f, default_flow_style=False, allow_unicode=True)
              print(f"Wrote {out_path}: {slugs}")
          EOF

      - name: Commit and push to readme
        run: |
          cd readme
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/Documentation/
          if git diff --staged --quiet; then
            echo "No changes to commit - skipping."
          else
            git commit -m "Sync from docs repo @ ${{ github.sha }}"
            git push origin v1.0
          fi
