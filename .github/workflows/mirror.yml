name: Mirror to readme.com repo

on:
  push:
    branches:
      - main

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout docs (source)
        uses: actions/checkout@v4
        with:
          path: docs
          fetch-depth: 0

      - name: Checkout readme (destination)
        uses: actions/checkout@v4
        with:
          repository: LicLens/readme
          ref: v1.0
          path: readme
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Clean stale artifacts from destination
        run: |
          rm -rf readme/docs/Documentation/.gitbook
          rm -rf readme/docs/Documentation/.github

      - name: Sync docs → readme/docs/Documentation
        run: |
          mkdir -p readme/docs/Documentation
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitbook' \
            --exclude='SUMMARY.md' \
            --exclude='_order.yaml' \
            docs/  readme/docs/Documentation/
          #  ↑ Also exclude any hand-crafted _order.yaml from source
          #    so only the generated ones (below) are authoritative

      - name: Relocate .gitbook/assets → assets and rewrite references
        run: |
          cd readme/docs/Documentation

          if [ -d ".gitbook/assets" ];
