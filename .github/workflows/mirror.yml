name: Mirror to readme.com repo

on:
  push:
    branches:
      - main

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs (source)
        uses: actions/checkout@v4
        with:
          path: docs
          fetch-depth: 0

      - name: Checkout readme (destination)
        uses: actions/checkout@v4
        with:
          repository: LicLens/readme
          ref: v1.0
          path: readme
          fetch-depth: 0                    # avoids shallow-push failures on divergence
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Sync docs → readme/docs/Documentation
        run: |
          mkdir -p readme/docs/Documentation
          # Trailing slash on source = copy CONTENTS, not the folder itself.
          # Exclude SUMMARY.md (ReadMe ignores it; we convert it to _order.yaml below).
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.DS_Store' \
            --exclude='SUMMARY.md' \
            docs/ readme/docs/Documentation/

      - name: Relocate .gitbook/assets → assets and rewrite references
        run: |
          cd readme/docs/Documentation
          if [ -d ".gitbook/assets" ]; then
            mkdir -p assets
            cp -a .gitbook/assets/. assets/
            rm -rf .gitbook
          fi
          # Rewrite every .gitbook/assets variant in markdown:
          # .gitbook/assets, ./.gitbook/assets, and any ../ depth.
          find . -type f -name '*.md' -print0 | xargs -0 --no-run-if-empty sed -i -E \
            -e 's#(\.\./)*\.gitbook/assets#assets#g' \
            -e 's#\./\.gitbook/assets#assets#g' \
            -e 's#\.gitbook/assets#assets#g'

      - name: Relocate root README into getting-started as landing page (index)
        run: |
          python3 - <<'EOF'
          import os, re

          root = "readme/docs/Documentation"
          src  = os.path.join(root, "README.md")
          if not os.path.exists(src):
              print("No root README.md to relocate")
              raise SystemExit(0)

          text = open(src, encoding="utf-8").read()

          # README moves one level deeper (Documentation/ -> Documentation/getting-started/),
          # so re-relativize its internal links to resolve from the new location.
          def fix(m):
              pre, target, post = m.group(1), m.group(2), m.group(3)
              if re.match(r'^[a-z][a-z0-9+.\-]*:', target, re.I) or target.startswith('#'):
                  return m.group(0)
              path, sep, anchor = target.partition('#')
              if not path:
                  return m.group(0)
              newpath = os.path.relpath(os.path.normpath(path), "getting-started").replace(os.sep, "/")
              return f'{pre}{newpath}{sep}{anchor}{post}'
          text = re.sub(r'(\]\()([^)\s]+)((?:\s+"[^"]*")?\))', fix, text)

          # The root README BECOMES the getting-started landing page itself
          # (getting-started/index.md), so /docs/getting-started shows this content
          # instead of an empty stub. No separate "welcome" child page is created.
          dest_dir = os.path.join(root, "getting-started")
          os.makedirs(dest_dir, exist_ok=True)
          open(os.path.join(dest_dir, "index.md"), "w", encoding="utf-8").write(text)
          os.remove(src)
          print("Relocated README.md -> getting-started/index.md (landing page, links re-relativized)")
          EOF

      # ── FIX ─────────────────────────────────────────────────────────────────
      # ReadMe requires:
      #   (a) every folder to have an index.md  (folder landing page), and
      #   (b) NO two pages sharing a slug.
      # GitBook ships one README.md per folder, all of which slugify to "readme"
      # and collide -> 404 / broken rendering. We convert each remaining
      # README.md -> index.md and rewrite the links that pointed at it. The root
      # README is already handled above, so only NESTED folder READMEs remain here.
      - name: Convert nested folder README.md → index.md (folder landing pages)
        run: |
          python3 - <<'EOF'
          import os, re, glob

          root = "readme/docs/Documentation"

          # 1) Find every nested README.md (root one is already gone -> welcome.md).
          readmes = [p for p in glob.glob(os.path.join(root, '**', 'README.md'), recursive=True)]

          renamed = []
          for src in readmes:
              dst = os.path.join(os.path.dirname(src), "index.md")
              # Never clobber an index.md the author already provided.
              if os.path.exists(dst):
                  print(f"SKIP (index.md already exists): {os.path.relpath(dst, root)}")
                  continue
              os.rename(src, dst)
              renamed.append(os.path.relpath(src, root).replace(os.sep, "/"))

          # 2) Rewrite links across ALL pages that pointed at a renamed README,
          #    e.g. [..](foo/README.md) or [..](./README.md) -> .../index.md.
          #    Match README(.md) as a path component; preserve #anchors + titles.
          link_re = re.compile(r'(\]\()([^)\s]+)((?:\s+"[^"]*")?\))')
          def rewrite(text):
              def fix(m):
                  pre, target, post = m.group(1), m.group(2), m.group(3)
                  if re.match(r'^[a-z][a-z0-9+.\-]*:', target, re.I) or target.startswith('#'):
                      return m.group(0)
                  path, sep, anchor = target.partition('#')
                  # README or README.md as the final path component
                  new = re.sub(r'(^|/)README(\.md)?$', lambda mm: f'{mm.group(1)}index{mm.group(2) or ""}', path)
                  if new == path:
                      return m.group(0)
                  return f'{pre}{new}{sep}{anchor}{post}'
              return link_re.sub(fix, text)

          changed = 0
          for path in glob.glob(os.path.join(root, '**', '*.md'), recursive=True):
              raw = open(path, encoding="utf-8").read()
              new = rewrite(raw)
              if new != raw:
                  open(path, "w", encoding="utf-8").write(new)
                  changed += 1

          print(f"Renamed {len(renamed)} README.md -> index.md: {renamed}")
          print(f"Rewrote README links in {changed} page(s)")
          EOF

      # ── FIX ─────────────────────────────────────────────────────────────────
      # Make each folder's FIRST document (in SUMMARY.md order) its landing page.
      # For every folder that does NOT already have an index.md (i.e. had no
      # README and none was relocated there), promote its first child page to
      # index.md: rename first-child.md -> index.md and rewrite every link that
      # pointed at it. This gives each category a real, content-rich landing page
      # instead of an empty stub, matching the getting-started behaviour.
      #
      # Runs AFTER README->index (so author-provided/README landing pages win) and
      # BEFORE macro/frontmatter/_order steps (so the promoted page is processed
      # and ordered like any other page).
      - name: Promote first document to index.md for folders without one
        run: |
          python3 - <<'EOF'
          import os, re, glob
          from collections import OrderedDict

          summary_path = "docs/SUMMARY.md"
          root         = "readme/docs/Documentation"

          # Build, per folder, the ordered list of its DIRECT child .md pages from
          # SUMMARY.md. README.md was already renamed to index.md upstream, so map
          # those entries accordingly when reading SUMMARY.
          entry_re = re.compile(r'^(\s*)[\*\-]\s+\[.*?\]\((.*?)\)')
          first_child = OrderedDict()   # folder rel-path -> first direct child basename (no .md)

          if os.path.exists(summary_path):
              for line in open(summary_path, encoding="utf-8"):
                  m = entry_re.match(line)
                  if not m:
                      continue
                  rel = m.group(2).strip().lstrip("./")
                  if not rel.endswith(".md"):
                      continue
                  rel = re.sub(r'(^|/)README\.md$', lambda mm: f'{mm.group(1)}index.md', rel)
                  parts = rel.split("/")
                  if len(parts) < 2:
                      continue                      # root-level page, not in a folder
                  folder = "/".join(parts[:-1])
                  name   = parts[-1][:-3]           # strip .md
                  if name == "index":
                      continue                      # already a landing page entry
                  # record the FIRST non-index child seen for this folder
                  if folder not in first_child:
                      first_child[folder] = name

          link_re = re.compile(r'(\]\()([^)\s]+)((?:\s+"[^"]*")?\))')
          def rewrite_links(text, old_slug, folder):
              # Rewrite links that resolve to <folder>/<old_slug>(.md) -> <folder>/index
              # We match the basename component; ReadMe links by slug so dropping the
              # leaf to "index" is sufficient. Preserve #anchors, titles, externals.
              def fix(m):
                  pre, target, post = m.group(1), m.group(2), m.group(3)
                  if re.match(r'^[a-z][a-z0-9+.\-]*:', target, re.I) or target.startswith('#'):
                      return m.group(0)
                  path, sep, anchor = target.partition('#')
                  base = os.path.basename(path)
                  if base in (old_slug, old_slug + ".md"):
                      newpath = re.sub(r'(^|/)' + re.escape(base) + r'$',
                                       lambda mm: f'{mm.group(1)}index', path)
                      return f'{pre}{newpath}{sep}{anchor}{post}'
                  return m.group(0)
              return link_re.sub(fix, text)

          promoted = []
          for folder, child in first_child.items():
              fdir = os.path.join(root, folder)
              if not os.path.isdir(fdir):
                  continue
              if os.path.exists(os.path.join(fdir, "index.md")):
                  continue                          # already has a landing page
              src = os.path.join(fdir, child + ".md")
              if not os.path.exists(src):
                  continue
              os.rename(src, os.path.join(fdir, "index.md"))
              promoted.append((folder, child))

          # Rewrite links across ALL pages for every promotion performed.
          if promoted:
              for path in glob.glob(os.path.join(root, '**', '*.md'), recursive=True):
                  raw = open(path, encoding="utf-8").read()
                  new = raw
                  for folder, child in promoted:
                      new = rewrite_links(new, child, folder)
                  if new != raw:
                      open(path, "w", encoding="utf-8").write(new)

          for folder, child in promoted:
              print(f"  promoted {folder}/{child}.md -> {folder}/index.md")
          print(f"First-document landing pages created in {len(promoted)} folder(s)")
          EOF

      - name: Convert GitBook content macros → ReadMe MDX (Callouts, etc.)
        run: |
          python3 - <<'EOF'
          import re, glob, os

          root  = "readme/docs/Documentation"
          # GitBook hint style -> (ReadMe Callout theme, Font Awesome icon). No emoji.
          THEME = {
              "info":    ("info",    "fa-circle-info"),
              "note":    ("default", "fa-circle-info"),
              "tip":     ("okay",    "fa-circle-check"),
              "success": ("okay",    "fa-circle-check"),
              "warning": ("warn",    "fa-triangle-exclamation"),
              "danger":  ("error",   "fa-circle-exclamation"),
          }

          def convert(text):
              # {% hint style="X" %} ... {% endhint %} -> ReadMe <Callout> (MDX, FA icon)
              def hint(m):
                  style = (m.group(1) or "info").lower()
                  theme, icon = THEME.get(style, ("default", "fa-circle-info"))
                  body = m.group(2).strip("\n")
                  # blank lines around body so MDX parses it as markdown blocks
                  return f'<Callout icon="{icon}" theme="{theme}">\n\n{body}\n\n</Callout>'
              text = re.sub(r'\{%\s*hint\s+style="([^"]+)"\s*%\}(.*?)\{%\s*endhint\s*%\}',
                            hint, text, flags=re.DOTALL)
              # {% code ... %} ```...``` {% endcode %} -> keep fenced code only
              text = re.sub(r'\{%\s*code[^%]*%\}\s*\n(.*?)\n\{%\s*endcode\s*%\}',
                            lambda m: m.group(1), text, flags=re.DOTALL)
              # {% content-ref url="X" %} [..](..) {% endcontent-ref %} -> plain md link
              text = re.sub(r'\{%\s*content-ref[^%]*%\}\s*(.*?)\s*\{%\s*endcontent-ref\s*%\}',
                            lambda m: m.group(1).strip(), text, flags=re.DOTALL)
              # {% embed url="X" %} -> bare URL (ReadMe auto-embeds)
              text = re.sub(r'\{%\s*embed\s+url="([^"]+)"\s*%\}', r'\1', text)
              # strip remaining structural GitBook tags so nothing renders literally
              text = re.sub(r'\{%\s*/?\s*(tabs|tab|endtab|endtabs|columns|column|'
                            r'stepper|step|endstep|endstepper)[^%]*%\}', '', text)
              # remove .md extension from internal links (ReadMe links by slug);
              # keep #anchors, link titles, external URLs and non-.md assets intact
              def strip_md(m):
                  pre, target, post = m.group(1), m.group(2), m.group(3)
                  if re.match(r'^[a-z][a-z0-9+.\-]*:', target, re.I) or target.startswith('#'):
                      return m.group(0)
                  path, sep, anchor = target.partition('#')
                  if path.endswith('.md'):
                      path = path[:-3]
                  return f'{pre}{path}{sep}{anchor}{post}'
              text = re.sub(r'(\]\()([^)\s]+)((?:\s+"[^"]*")?\))', strip_md, text)
              return text

          changed = 0
          for path in glob.glob(os.path.join(root, '**', '*.md'), recursive=True):
              raw = open(path, encoding="utf-8").read()
              new = convert(raw)
              if new != raw:
                  open(path, "w", encoding="utf-8").write(new)
                  changed += 1
          print(f"GitBook macros converted in {changed} page(s)")
          EOF

      # ── FIX ─────────────────────────────────────────────────────────────────
      # Inject/merge frontmatter AND guarantee a UNIQUE title per page. ReadMe
      # derives slugs from titles, so two index.md files both titled (or auto-
      # named) the same will collide. We make folder index pages inherit a title
      # from SUMMARY.md / the folder name, and de-duplicate any clashes by
      # appending the parent folder context (Yurii's "README for Security and
      # Compliance" pattern, done automatically).
      - name: Inject / merge ReadMe frontmatter (unique title / summary / hidden)
        run: |
          python3 - <<'EOF'
          import os, re, glob, yaml

          summary_path  = "docs/SUMMARY.md"
          root          = "readme/docs/Documentation"
          # ReadMe's File Format schema (Documentation Structure page) names the
          # subtitle field `excerpt`. ReadMe's Bi-Directional Sync page calls it
          # `summary`. The docs conflict, so we write `excerpt` (schema) AND mirror
          # the same value to `summary` — identical value, can't render wrong either way.
          # Once you confirm which one your site uses, set MIRROR_SUMMARY = False.
          EXCERPT_FIELD  = "excerpt"
          MIRROR_SUMMARY = True
          # GitBook-only frontmatter keys ReadMe doesn't consume — drop to keep it clean.
          STRIP_KEYS    = {"cover", "coverY", "coverYAdjust", "icon", "layout"}

          # SUMMARY.md links point at README.md / *.md; map BOTH the original path
          # and its index.md-renamed equivalent to the human title in the link text.
          title_map = {}
          if os.path.exists(summary_path):
              link_re = re.compile(r'\[([^\]]+)\]\(([^)]+\.md)\)')
              for line in open(summary_path, encoding="utf-8"):
                  m = link_re.search(line)
                  if m:
                      rel = m.group(2).strip().lstrip("./")
                      title = m.group(1).strip()
                      title_map[rel] = title
                      # README.md was renamed to index.md in an earlier step
                      title_map[re.sub(r'(^|/)README\.md$',
                                       lambda mm: f'{mm.group(1)}index.md', rel)] = title

          def split_frontmatter(raw):
              if raw.lstrip().startswith('---'):
                  m = re.match(r'^\s*---\s*\n(.*?)\n---\s*\n?(.*)$', raw, re.DOTALL)
                  if m:
                      try:
                          data = yaml.safe_load(m.group(1)) or {}
                      except yaml.YAMLError:
                          data = {}
                      if isinstance(data, dict):
                          return data, m.group(2)
              return {}, raw

          def first_h1(text):
              m = re.search(r'^\s*#\s+(.+?)\s*$', text, re.MULTILINE)
              return m.group(1).strip() if m else None

          def first_paragraph(text):
              for block in re.split(r'\n\s*\n', text):
                  b = block.strip()
                  if not b or b.startswith('#') or b.startswith('---'):
                      continue
                  b = re.sub(r'[*_`>#]', '', b).replace('\n', ' ').strip()
                  return (b[:147] + '...') if len(b) > 150 else b
              return ""

          def humanize(s):
              return re.sub(r'[-_]', ' ', s).strip().title()

          def folder_title(rel):
              # For an index page at <folder>/index.md, derive a title from the
              # FOLDER name, not the literal word "index".
              d = os.path.dirname(rel)
              if d:
                  return humanize(os.path.basename(d))
              return "Overview"

          # First pass: decide each page's title.
          pages = []   # (path, rel, fm, body, title, is_index)
          for path in glob.glob(os.path.join(root, '**', '*.md'), recursive=True):
              raw      = open(path, encoding="utf-8").read()
              fm, body = split_frontmatter(raw)
              rel      = os.path.relpath(path, root).replace(os.sep, '/')
              is_index = os.path.basename(rel) == "index.md"

              if is_index:
                  # index pages: prefer explicit fm title, else SUMMARY title for the
                  # folder, else the folder name. Avoid first_h1 alone (often generic).
                  title = (fm.get("title")
                           or title_map.get(rel)
                           or folder_title(rel)
                           or first_h1(body)
                           or "Overview")
              else:
                  title = (fm.get("title")
                           or title_map.get(rel)
                           or first_h1(body)
                           or humanize(os.path.splitext(os.path.basename(rel))[0]))
              pages.append([path, rel, fm, body, title, is_index])

          # Second pass: de-duplicate titles (ReadMe slug collisions). When two
          # pages resolve to the same title, qualify with their parent folder.
          seen = {}
          for entry in pages:
              t = entry[4]
              seen.setdefault(t.lower(), []).append(entry)
          for t_lower, group in seen.items():
              if len(group) <= 1:
                  continue
              for entry in group:
                  rel = entry[1]
                  parent = os.path.basename(os.path.dirname(rel))
                  if parent:
                      entry[4] = f"{entry[4]} ({humanize(parent)})"

          # Final safety net: if any collision survives (e.g. same title, same
          # parent name in different trees), append a numeric suffix.
          final_seen = {}
          for entry in pages:
              key = entry[4].lower()
              if key in final_seen:
                  final_seen[key] += 1
                  entry[4] = f"{entry[4]} {final_seen[key]}"
              else:
                  final_seen[key] = 1

          changed = total = 0
          for path, rel, fm, body, title, is_index in pages:
              total += 1
              new = {}
              new["title"]       = title
              sub                = fm.get("excerpt") or fm.get("summary") or first_paragraph(body)
              new[EXCERPT_FIELD] = sub
              if MIRROR_SUMMARY:
                  new["summary"] = sub
              new["hidden"]      = fm.get("hidden", False)

              # SEO description lives under metadata.description per ReadMe's schema.
              metadata = dict(fm.get("metadata") or {})
              if fm.get("description") and "description" not in metadata:
                  metadata["description"] = fm["description"]
              if metadata:
                  new["metadata"] = metadata

              for k, v in fm.items():
                  if k in STRIP_KEYS or k in ("title", "excerpt", "summary",
                                              "hidden", "description", "metadata"):
                      continue
                  new[k] = v

              out = ("---\n"
                     + yaml.dump(new, default_flow_style=False, allow_unicode=True,
                                 sort_keys=False, width=4096)
                     + "---\n\n" + body.lstrip("\n"))
              raw = open(path, encoding="utf-8").read()
              if out != raw:
                  open(path, "w", encoding="utf-8").write(out)
                  changed += 1

          print(f"Frontmatter normalized: {changed} of {total} pages changed "
                f"(field='{EXCERPT_FIELD}', mirror_summary={MIRROR_SUMMARY})")
          EOF

      # ── FIX ─────────────────────────────────────────────────────────────────
      # Build a landing page for every folder, then write _order.yaml for every
      # folder — in ONE step so stubbing and ordering stay consistent. Fixes:
      #   * subfolder-only folders (e.g. `msp`) that had no index.md and vanished
      #   * top-level folders (e.g. `reports`) missing from the root _order.yaml
      # SUMMARY.md drives ORDER; the on-disk tree drives COMPLETENESS (any folder
      # present on disk is included even if SUMMARY missed it).
      - name: Ensure landing pages and generate _order.yaml for every folder
        run: |
          python3 - <<'EOF'
          import re, os, yaml
          from collections import OrderedDict

          summary_path = "docs/SUMMARY.md"
          root         = "readme/docs/Documentation"

          def humanize(s):
              return re.sub(r'[-_]', ' ', s).strip().title() or "Overview"

          def has_markdown_below(dirpath):
              for _, _, files in os.walk(dirpath):
                  if any(f.endswith(".md") for f in files):
                      return True
              return False

          # 1) STUB: ensure every doc folder has an index.md (covers subfolder-only
          #    folders like `msp` and any folder with no README/SUMMARY entry).
          stubbed = 0
          for dirpath, dirnames, filenames in os.walk(root):
              if os.path.basename(dirpath) == "assets":
                  dirnames[:] = []           # don't descend into assets
                  continue
              if "index.md" in filenames:
                  continue
              if not has_markdown_below(dirpath):
                  continue
              title = humanize(os.path.basename(dirpath)) if dirpath != root else "Overview"
              stub = (f"---\ntitle: {title}\nexcerpt: ''\nsummary: ''\nhidden: false\n---\n\n"
                      f"# {title}\n")
              open(os.path.join(dirpath, "index.md"), "w", encoding="utf-8").write(stub)
              stubbed += 1
              print(f"  stub index.md -> {os.path.relpath(dirpath, root) or '(root)'}")
          print(f"Stub index.md created in {stubbed} folder(s)")

          # 2) ORDER from SUMMARY.md: parent rel-path ('' = root) -> ordered children.
          entry_re = re.compile(r'^(\s*)[\*\-]\s+\[.*?\]\((.*?)\)')
          children = OrderedDict()

          def register(parent, name):
              children.setdefault(parent, [])
              if name not in children[parent]:
                  children[parent].append(name)

          if os.path.exists(summary_path):
              for line in open(summary_path, encoding="utf-8"):
                  m = entry_re.match(line)
                  if not m:
                      continue
                  rel = m.group(2).strip().lstrip("./")
                  if not rel.endswith(".md"):
                      continue
                  rel = re.sub(r'(^|/)README\.md$', lambda mm: f'{mm.group(1)}index.md', rel)
                  parts = rel.split("/")
                  for i in range(len(parts)):
                      parent = "/".join(parts[:i])
                      name   = parts[i]
                      if name.endswith(".md"):
                          name = name[:-3]
                      register(parent, name)

          # 3) COMPLETENESS: append any on-disk folder/page SUMMARY didn't list, so
          #    nothing is silently dropped from the nav. Walk the tree and register
          #    each subfolder under its parent, and each non-index .md page too.
          for dirpath, dirnames, filenames in os.walk(root):
              if os.path.basename(dirpath) == "assets":
                  dirnames[:] = []
                  continue
              parent_rel = os.path.relpath(dirpath, root).replace(os.sep, "/")
              parent_rel = "" if parent_rel == "." else parent_rel
              for d in sorted(dirnames):
                  if d == "assets":
                      continue
                  if has_markdown_below(os.path.join(dirpath, d)):
                      register(parent_rel, d)
              for f in sorted(filenames):
                  if f.endswith(".md") and f != "index.md":
                      register(parent_rel, f[:-3])

          # 4) WRITE _order.yaml for every folder. index leads, then README/legacy,
          #    then remaining children that actually exist on disk.
          INDEX_NAMES = ["index", "README"]
          written = 0
          for parent, kids in children.items():
              out_dir = os.path.join(root, parent) if parent else root
              if not os.path.isdir(out_dir):
                  continue
              leads = [n for n in INDEX_NAMES
                       if os.path.exists(os.path.join(out_dir, n + ".md"))]
              def exists(c):
                  return (os.path.exists(os.path.join(out_dir, c + ".md"))
                          or os.path.isdir(os.path.join(out_dir, c)))
              ordered = leads + [k for k in kids if k not in leads and exists(k)]
              with open(os.path.join(out_dir, "_order.yaml"), "w", encoding="utf-8") as f:
                  yaml.dump(ordered, f, default_flow_style=False,
                            sort_keys=False, allow_unicode=True)
              written += 1
              print(f"  {parent or '(root)'}/_order.yaml -> {ordered}")

          print(f"_order.yaml written for {written} folder(s)")
          EOF

      - name: Purge .DS_Store from readme repo
        run: |
          cd readme
          # Remove any .DS_Store (root or nested) from working tree AND git index,
          # so already-committed ones (incl. the repo root) get cleaned on this run.
          find . -path ./.git -prune -o -type f -name '.DS_Store' -print0 \
            | xargs -0 -r git rm -f --quiet --ignore-unmatch

      - name: Commit and push to readme
        run: |
          cd readme
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/Documentation/
          if git diff --staged --quiet; then
            echo "No changes to commit — skipping."
          else
            git commit -m "Sync from docs repo @ ${{ github.sha }}"
            git push origin v1.0
          fi
